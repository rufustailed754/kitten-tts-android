name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs pull

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Build espeak-ng for Android
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973
          export TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64

          git clone --depth 1 https://github.com/espeak-ng/espeak-ng.git /tmp/espeak-ng-build
          cd /tmp/espeak-ng-build

          # Use cmake cross-compilation with Android NDK toolchain
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DUSE_ASYNC=OFF \
            -DUSE_MBROLA=OFF \
            -DUSE_LIBPCAUDIO=OFF \
            -DUSE_KLATT=OFF \
            -DUSE_SPEECHPLAYER=OFF \
            -DCMAKE_C_FLAGS="-fPIC"
          cmake --build . --config Release -j$(nproc)

          # Find and copy the built .so
          mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
          find . -name "libespeak-ng.so" -exec cp {} $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/ \;
          ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kitten-tts-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: kitten-tts-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
